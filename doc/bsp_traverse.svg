<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="monospace" font-size="12">
  <defs>
    <marker id="dir-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#FF3333"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="white"/>

  <!-- Title -->
  <text x="240" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">BSP Front-to-Back Traversal</text>

  <!-- ====== LEFT SIDE: Top-down map view ====== -->

  <!-- Map border -->
  <rect x="20" y="35" width="440" height="340" fill="#f8f8f8" stroke="#ccc" stroke-width="1" rx="3"/>

  <!-- Subsector regions (light blue fills) -->
  <!-- SS0: top-left -->
  <polygon points="40,55 230,55 230,185 40,185" fill="#CCE5FF" stroke="#99bbdd" stroke-width="1"/>
  <text x="135" y="130" text-anchor="middle" font-size="13" fill="#336699">SS0</text>

  <!-- SS1: top-right -->
  <polygon points="230,55 440,55 440,185 230,185" fill="#CCE5FF" stroke="#99bbdd" stroke-width="1"/>
  <text x="335" y="130" text-anchor="middle" font-size="13" fill="#336699">SS1</text>

  <!-- SS2: bottom-left -->
  <polygon points="40,185 180,185 180,355 40,355" fill="#CCE5FF" stroke="#99bbdd" stroke-width="1"/>
  <text x="110" y="280" text-anchor="middle" font-size="13" fill="#336699">SS2</text>

  <!-- SS3: bottom-center -->
  <polygon points="180,185 330,185 330,355 180,355" fill="#CCE5FF" stroke="#99bbdd" stroke-width="1"/>
  <text x="255" y="280" text-anchor="middle" font-size="13" fill="#336699">SS3</text>

  <!-- SS4: bottom-right -->
  <polygon points="330,185 440,185 440,355 330,355" fill="#CCE5FF" stroke="#99bbdd" stroke-width="1"/>
  <text x="385" y="280" text-anchor="middle" font-size="13" fill="#336699">SS4</text>

  <!-- Partition lines (dashed dark grey) -->
  <!-- P0: horizontal split (top half / bottom half) -->
  <line x1="40" y1="185" x2="440" y2="185" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="445" y="189" font-size="9" fill="#666666">P0</text>

  <!-- P1: vertical split in top half -->
  <line x1="230" y1="55" x2="230" y2="185" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="222" y="50" font-size="9" fill="#666666">P1</text>

  <!-- P2: vertical split in bottom half (left / right portion) -->
  <line x1="180" y1="185" x2="180" y2="355" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="172" y="362" font-size="9" fill="#666666">P2</text>

  <!-- P3: vertical split in bottom-right portion -->
  <line x1="330" y1="185" x2="330" y2="355" stroke="#666666" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="322" y="362" font-size="9" fill="#666666">P3</text>

  <!-- Bounding boxes (thin dotted rectangles) -->
  <!-- BBox for top subtree (children of P0 near side) -->
  <rect x="35" y="50" width="410" height="140" fill="none" stroke="#999999" stroke-width="0.8" stroke-dasharray="2,3" rx="2"/>

  <!-- BBox for bottom subtree (children of P0 far side) -->
  <rect x="35" y="180" width="410" height="180" fill="none" stroke="#999999" stroke-width="0.8" stroke-dasharray="2,3" rx="2"/>

  <!-- BBox for SS0 (left child of P1) -->
  <rect x="37" y="52" width="196" height="136" fill="none" stroke="#999999" stroke-width="0.7" stroke-dasharray="2,3" rx="1"/>

  <!-- BBox for SS1 (right child of P1) -->
  <rect x="227" y="52" width="216" height="136" fill="none" stroke="#999999" stroke-width="0.7" stroke-dasharray="2,3" rx="1"/>

  <!-- BBox for SS2 (left child of P2) -->
  <rect x="37" y="182" width="146" height="176" fill="none" stroke="#999999" stroke-width="0.7" stroke-dasharray="2,3" rx="1"/>

  <!-- BBox for right subtree of P2 (SS3+SS4) -->
  <rect x="177" y="182" width="266" height="176" fill="none" stroke="#999999" stroke-width="0.7" stroke-dasharray="2,3" rx="1"/>

  <!-- Player position (red dot with direction arrow) -->
  <circle cx="130" cy="100" r="5" fill="#FF3333" stroke="#cc0000" stroke-width="1"/>
  <!-- Direction arrow pointing right and slightly down -->
  <line x1="135" y1="100" x2="160" y2="108" stroke="#FF3333" stroke-width="2" marker-end="url(#dir-arrow)"/>
  <text x="115" y="93" font-size="10" fill="#FF3333" font-weight="bold">player</text>

  <!-- Traversal order numbers (bold black) -->
  <!-- SS0 visited first (player is here) -->
  <circle cx="135" cy="155" r="11" fill="#FFE066" stroke="#333" stroke-width="1.2"/>
  <text x="135" y="159" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">1</text>

  <!-- SS1 visited second (other side of P1, still in top half) -->
  <circle cx="335" cy="155" r="11" fill="#FFE066" stroke="#333" stroke-width="1.2"/>
  <text x="335" y="159" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">2</text>

  <!-- SS2 visited third (near side of P2 in bottom half) -->
  <circle cx="110" cy="320" r="11" fill="#FFE066" stroke="#333" stroke-width="1.2"/>
  <text x="110" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">3</text>

  <!-- SS3 visited fourth (near side of P3 in bottom-right) -->
  <circle cx="255" cy="320" r="11" fill="#FFE066" stroke="#333" stroke-width="1.2"/>
  <text x="255" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">4</text>

  <!-- SS4 visited fifth (far side of P3) -->
  <circle cx="385" cy="320" r="11" fill="#FFE066" stroke="#333" stroke-width="1.2"/>
  <text x="385" y="324" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">5</text>

  <!-- ====== RIGHT SIDE: BSP tree diagram ====== -->

  <text x="640" y="52" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">BSP Tree</text>

  <!-- Root node P0 -->
  <rect x="610" y="60" width="60" height="28" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.2"/>
  <text x="640" y="79" text-anchor="middle" font-size="11" fill="#333">P0</text>

  <!-- Level 1: P1 (near/left) and P2 (far/right) -->
  <!-- Line from P0 to P1 -->
  <line x1="625" y1="88" x2="575" y2="120" stroke="#333" stroke-width="1"/>
  <text x="590" y="106" font-size="9" fill="#16a34a">near</text>

  <!-- Line from P0 to P2 -->
  <line x1="655" y1="88" x2="710" y2="120" stroke="#333" stroke-width="1"/>
  <text x="688" y="106" font-size="9" fill="#666">far</text>

  <!-- P1 node -->
  <rect x="545" y="120" width="60" height="28" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.2"/>
  <text x="575" y="139" text-anchor="middle" font-size="11" fill="#333">P1</text>

  <!-- P2 node -->
  <rect x="680" y="120" width="60" height="28" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.2"/>
  <text x="710" y="139" text-anchor="middle" font-size="11" fill="#333">P2</text>

  <!-- Level 2 from P1: SS0 (near) and SS1 (far) -->
  <line x1="560" y1="148" x2="530" y2="178" stroke="#333" stroke-width="1"/>
  <text x="536" y="168" font-size="9" fill="#16a34a">near</text>

  <line x1="590" y1="148" x2="620" y2="178" stroke="#333" stroke-width="1"/>
  <text x="612" y="168" font-size="9" fill="#666">far</text>

  <!-- SS0 leaf -->
  <rect x="505" y="178" width="50" height="26" rx="10" fill="#CCE5FF" stroke="#336699" stroke-width="1.2"/>
  <text x="530" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#336699">SS0</text>
  <circle cx="530" cy="214" r="9" fill="#FFE066" stroke="#333" stroke-width="1"/>
  <text x="530" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">1</text>

  <!-- SS1 leaf -->
  <rect x="595" y="178" width="50" height="26" rx="10" fill="#CCE5FF" stroke="#336699" stroke-width="1.2"/>
  <text x="620" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#336699">SS1</text>
  <circle cx="620" cy="214" r="9" fill="#FFE066" stroke="#333" stroke-width="1"/>
  <text x="620" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">2</text>

  <!-- Level 2 from P2: SS2 (near) and P3 (far) -->
  <line x1="695" y1="148" x2="670" y2="178" stroke="#333" stroke-width="1"/>
  <text x="673" y="168" font-size="9" fill="#16a34a">near</text>

  <line x1="725" y1="148" x2="755" y2="178" stroke="#333" stroke-width="1"/>
  <text x="747" y="168" font-size="9" fill="#666">far</text>

  <!-- SS2 leaf -->
  <rect x="645" y="178" width="50" height="26" rx="10" fill="#CCE5FF" stroke="#336699" stroke-width="1.2"/>
  <text x="670" y="195" text-anchor="middle" font-size="11" font-weight="bold" fill="#336699">SS2</text>
  <circle cx="670" cy="214" r="9" fill="#FFE066" stroke="#333" stroke-width="1"/>
  <text x="670" y="218" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">3</text>

  <!-- P3 node -->
  <rect x="730" y="178" width="50" height="26" rx="4" fill="#f0f0f0" stroke="#333" stroke-width="1.2"/>
  <text x="755" y="196" text-anchor="middle" font-size="11" fill="#333">P3</text>

  <!-- Level 3 from P3: SS3 (near) and SS4 (far) -->
  <line x1="742" y1="204" x2="715" y2="234" stroke="#333" stroke-width="1"/>
  <text x="718" y="226" font-size="9" fill="#16a34a">near</text>

  <line x1="768" y1="204" x2="775" y2="234" stroke="#333" stroke-width="1"/>
  <text x="780" y="226" font-size="9" fill="#666">far</text>

  <!-- SS3 leaf -->
  <rect x="690" y="236" width="50" height="26" rx="10" fill="#CCE5FF" stroke="#336699" stroke-width="1.2"/>
  <text x="715" y="253" text-anchor="middle" font-size="11" font-weight="bold" fill="#336699">SS3</text>
  <circle cx="715" cy="272" r="9" fill="#FFE066" stroke="#333" stroke-width="1"/>
  <text x="715" y="276" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">4</text>

  <!-- SS4 leaf -->
  <rect x="755" y="236" width="50" height="26" rx="10" fill="#CCE5FF" stroke="#336699" stroke-width="1.2"/>
  <text x="780" y="253" text-anchor="middle" font-size="11" font-weight="bold" fill="#336699">SS4</text>
  <circle cx="780" cy="272" r="9" fill="#FFE066" stroke="#333" stroke-width="1"/>
  <text x="780" y="276" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">5</text>

  <!-- Legend -->
  <text x="540" y="310" font-size="10" fill="#333">Traversal visits near side first,</text>
  <text x="540" y="324" font-size="10" fill="#333">then far side only if has_gap</text>
  <text x="540" y="338" font-size="10" fill="#333">reports visible screen columns.</text>

  <!-- Legend items -->
  <rect x="540" y="350" width="14" height="10" fill="#CCE5FF" stroke="#99bbdd" stroke-width="0.8"/>
  <text x="560" y="359" font-size="10" fill="#333">Subsector</text>

  <line x1="630" y1="355" x2="660" y2="355" stroke="#666666" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="665" y="359" font-size="10" fill="#333">Partition</text>

  <rect x="540" y="366" width="14" height="10" fill="none" stroke="#999999" stroke-width="0.8" stroke-dasharray="2,3"/>
  <text x="560" y="375" font-size="10" fill="#333">Bounding box</text>

  <circle cx="637" cy="371" r="4" fill="#FF3333"/>
  <text x="645" y="375" font-size="10" fill="#333">Player</text>
</svg>
