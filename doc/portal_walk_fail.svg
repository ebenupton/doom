<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="monospace" font-size="12">
  <rect width="640" height="420" fill="white"/>

  <!-- Axes -->
  <line x1="40" y1="320" x2="600" y2="320" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="320" x2="40" y2="20" stroke="black" stroke-width="1.5"/>
  <text x="320" y="348" text-anchor="middle" font-size="13">X</text>
  <text x="15" y="170" text-anchor="middle" font-size="13" transform="rotate(-90,15,170)">Y</text>

  <!-- Span 0 (leftmost) -->
  <polygon points="80,55 210,65 210,230 80,200" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="145" y="125" text-anchor="middle" font-size="11" fill="#336699">span 0</text>
  <text x="80" y="315" text-anchor="middle" font-size="10">x0</text>
  <text x="210" y="315" text-anchor="middle" font-size="10">x1</text>

  <!-- Span 1 (middle, narrow aperture on right) -->
  <polygon points="210,65 370,80 370,170 210,230" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="290" y="135" text-anchor="middle" font-size="11" fill="#336699">span 1</text>
  <text x="370" y="315" text-anchor="middle" font-size="10">x2</text>

  <!-- Span 2 (rightmost, opening back up) -->
  <polygon points="370,60 530,50 530,270 370,250" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="450" y="150" text-anchor="middle" font-size="11" fill="#336699">span 2</text>
  <text x="530" y="315" text-anchor="middle" font-size="10">x3</text>

  <!-- Portal 1 at x1 (wide aperture -- line passes) -->
  <line x1="210" y1="65" x2="210" y2="230" stroke="#33AA33" stroke-width="4" opacity="0.7"/>
  <text x="210" y="42" text-anchor="middle" font-size="10" fill="#33AA33">portal 1</text>
  <text x="196" y="62" text-anchor="end" font-size="9" fill="#33AA33">pt</text>
  <text x="196" y="234" text-anchor="end" font-size="9" fill="#33AA33">pb</text>

  <!-- Portal 2 at x2 (narrow aperture -- line fails) -->
  <line x1="370" y1="80" x2="370" y2="170" stroke="#33AA33" stroke-width="4" opacity="0.7"/>
  <text x="370" y="68" text-anchor="middle" font-size="10" fill="#33AA33">portal 2</text>
  <text x="356" y="78" text-anchor="end" font-size="9" fill="#33AA33">pt</text>
  <text x="356" y="174" text-anchor="end" font-size="9" fill="#33AA33">pb</text>
  <!-- Red X to show failure -->
  <text x="384" y="130" font-size="14" fill="#FF3333" font-weight="bold">FAIL</text>

  <!-- The full line path (dashed grey for rejected portions) -->
  <line x1="95" y1="100" x2="510" y2="210" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Segment 1: enter span 0, through portal 1, CB clip at portal 2 fail -->
  <!-- Entry at left edge of span 0 -->
  <line x1="95" y1="100" x2="355" y2="169" stroke="#FFAA00" stroke-width="3"/>
  <circle cx="95" cy="100" r="5" fill="black"/>
  <text x="55" y="97" font-size="10">enter</text>

  <!-- CB clip exit point in span 1 -->
  <circle cx="355" cy="169" r="5" fill="black"/>
  <text x="305" y="184" font-size="9">CB clip exit</text>

  <!-- Segment 2: walk resets, CB clip entry into span 2, exits at right edge -->
  <line x1="395" y1="178" x2="510" y2="210" stroke="#FFAA00" stroke-width="3"/>
  <circle cx="395" cy="178" r="5" fill="black"/>
  <text x="399" y="196" font-size="9">CB clip entry</text>

  <!-- Exit at right edge of span 2 -->
  <circle cx="510" cy="210" r="5" fill="black"/>
  <text x="515" y="207" font-size="10">exit</text>

  <!-- Portal check annotations -->
  <circle cx="210" cy="124" r="4" fill="#33AA33"/>
  <text x="220" y="121" font-size="9" fill="#33AA33">cheap accept</text>

  <circle cx="370" cy="158" r="4" fill="#FF3333"/>
  <text x="384" y="155" font-size="9" fill="#FF3333">Y outside</text>

  <!-- Output labels -->
  <rect x="60" y="270" width="220" height="28" fill="#FFAA00" fill-opacity="0.2" stroke="#FFAA00" rx="3"/>
  <text x="170" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#996600">segment 1 (enter -> clip)</text>

  <rect x="360" y="270" width="220" height="28" fill="#FFAA00" fill-opacity="0.2" stroke="#FFAA00" rx="3"/>
  <text x="470" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#996600">segment 2 (clip -> exit)</text>

  <!-- Annotation -->
  <text x="80" y="365" font-size="10">portal 1: cheap accept (y_lo,y_hi inside aperture)</text>
  <text x="80" y="378" font-size="10">portal 2: line Y outside aperture -> portal fail -> CB clip span 1</text>
  <text x="80" y="391" font-size="10">walk resets: try to enter span 2 -> CB clip entry -> output segment 2</text>
  <text x="80" y="404" font-size="10">result: two separate output segments (orange)</text>
</svg>
