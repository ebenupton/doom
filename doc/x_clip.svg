<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="monospace" font-size="12">
  <rect width="560" height="320" fill="white"/>

  <!-- Axes -->
  <line x1="40" y1="260" x2="520" y2="260" stroke="black" stroke-width="1.5"/>
  <line x1="40" y1="260" x2="40" y2="20" stroke="black" stroke-width="1.5"/>
  <text x="280" y="290" text-anchor="middle" font-size="13">X</text>
  <text x="15" y="140" text-anchor="middle" font-size="13" transform="rotate(-90,15,140)">Y</text>

  <!-- Span region -->
  <rect x="160" y="40" width="240" height="200" fill="#CCE5FF" fill-opacity="0.5" stroke="#336699" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="160" y="255" text-anchor="middle" font-size="10" fill="#336699">xlo</text>
  <text x="400" y="255" text-anchor="middle" font-size="10" fill="#336699">xhi</text>

  <!-- Original full line (dashed grey, rejected portions) -->
  <line x1="60" y1="200" x2="160" y2="160" stroke="#999999" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="80" x2="500" y2="47" stroke="#999999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Clipped line (solid red) -->
  <line x1="160" y1="160" x2="400" y2="80" stroke="#FF3333" stroke-width="2.5"/>

  <!-- Original endpoints -->
  <circle cx="60" cy="200" r="4" fill="#999999"/>
  <text x="45" y="215" font-size="10" fill="#999999">(lx1,ly1)</text>
  <circle cx="500" cy="47" r="4" fill="#999999"/>
  <text x="460" y="40" font-size="10" fill="#999999">(lx2,ly2)</text>

  <!-- Clipped endpoints -->
  <circle cx="160" cy="160" r="5" fill="black"/>
  <text x="108" y="175" font-size="10">(cx1,cy1)</text>
  <circle cx="400" cy="80" r="5" fill="black"/>
  <text x="410" y="75" font-size="10">(cx2,cy2)</text>

  <!-- frac08 annotation for left clip -->
  <line x1="60" y1="230" x2="160" y2="230" stroke="#336699" stroke-width="1"/>
  <line x1="60" y1="226" x2="60" y2="234" stroke="#336699" stroke-width="1"/>
  <line x1="160" y1="226" x2="160" y2="234" stroke="#336699" stroke-width="1"/>
  <text x="110" y="245" text-anchor="middle" font-size="10" fill="#336699">|xlo - lx1|</text>

  <line x1="60" y1="300" x2="500" y2="300" stroke="#FF3333" stroke-width="1"/>
  <line x1="60" y1="296" x2="60" y2="304" stroke="#FF3333" stroke-width="1"/>
  <line x1="500" y1="296" x2="500" y2="304" stroke="#FF3333" stroke-width="1"/>
  <text x="280" y="315" text-anchor="middle" font-size="10" fill="#FF3333">|dx| = |lx2 - lx1|</text>

  <!-- Formula -->
  <rect x="140" y="5" width="280" height="28" fill="#f0f0f0" stroke="black" rx="3"/>
  <text x="280" y="23" text-anchor="middle" font-size="11" font-weight="bold">f = frac08(|xlo - lx1|, |dx|) = 0.8 u8</text>
</svg>