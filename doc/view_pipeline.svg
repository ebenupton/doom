<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" font-family="monospace" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#111">View Transform Pipeline</text>

  <!-- ====== MAIN FLOW (top row) ====== -->

  <!-- World coords box -->
  <rect x="20" y="60" width="140" height="60" rx="6" fill="#f0f9ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="90" y="82" text-anchor="middle" font-weight="bold" fill="#1e40af">World</text>
  <text x="90" y="98" text-anchor="middle" fill="#1e40af">(wx, wy)</text>
  <text x="90" y="114" text-anchor="middle" font-size="11" fill="#6b7280">8.0 signed</text>

  <!-- Arrow: world -> rotation -->
  <line x1="160" y1="90" x2="210" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Rotation box -->
  <rect x="212" y="50" width="180" height="80" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="302" y="72" text-anchor="middle" font-weight="bold" fill="#854d0e">Rotation</text>
  <text x="302" y="90" text-anchor="middle" font-size="11" fill="#854d0e">vx = dx*sin - dy*cos</text>
  <text x="302" y="106" text-anchor="middle" font-size="11" fill="#854d0e">vy = dx*cos + dy*sin</text>
  <text x="302" y="122" text-anchor="middle" font-size="10" fill="#a16207">4 muls (8.0 x 0.8 = 8.8)</text>

  <!-- Arrow: rotation -> view -->
  <line x1="392" y1="90" x2="442" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- View coords box -->
  <rect x="444" y="60" width="140" height="60" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="514" y="82" text-anchor="middle" font-weight="bold" fill="#166534">View</text>
  <text x="514" y="98" text-anchor="middle" fill="#166534">(vx, vy)</text>
  <text x="514" y="114" text-anchor="middle" font-size="11" fill="#6b7280">8.0 signed</text>

  <!-- Arrow: view -> reciprocal -->
  <line x1="584" y1="90" x2="634" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reciprocal box -->
  <rect x="636" y="50" width="140" height="80" rx="6" fill="#fdf2f8" stroke="#db2777" stroke-width="1.5"/>
  <text x="706" y="72" text-anchor="middle" font-weight="bold" fill="#9d174d">Reciprocal</text>
  <text x="706" y="90" text-anchor="middle" font-size="11" fill="#9d174d">128 / vy</text>
  <text x="706" y="106" text-anchor="middle" font-size="11" fill="#9d174d">(hi, lo)</text>
  <text x="706" y="122" text-anchor="middle" font-size="10" fill="#be185d">table lookup (0.8)</text>

  <!-- Arrow: reciprocal -> screen -->
  <line x1="776" y1="90" x2="806" y2="90" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Screen coords box -->
  <rect x="808" y="60" width="100" height="60" rx="6" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="858" y="82" text-anchor="middle" font-weight="bold" fill="#5b21b6">Screen</text>
  <text x="858" y="98" text-anchor="middle" fill="#5b21b6">(sx, sy)</text>
  <text x="858" y="114" text-anchor="middle" font-size="11" fill="#6b7280">8.0 integer</text>

  <!-- ====== NEAR CLIP (below main flow, between view and reciprocal) ====== -->

  <rect x="500" y="165" width="160" height="55" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="580" y="187" text-anchor="middle" font-weight="bold" fill="#c2410c">Near Clip</text>
  <text x="580" y="205" text-anchor="middle" font-size="11" fill="#c2410c">vy >= 1 (NEAR_FP)</text>

  <!-- Arrow from view down to near clip -->
  <line x1="514" y1="120" x2="514" y2="155" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="514" y1="155" x2="530" y2="165" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow from near clip back up to reciprocal input -->
  <line x1="660" y1="175" x2="690" y2="155" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="690" y1="155" x2="690" y2="130" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="700" y="150" font-size="10" fill="#ea580c">(ex, ey)</text>

  <!-- ====== PROJECTION DETAIL (below screen) ====== -->

  <!-- X projection detail -->
  <rect x="40" y="280" width="380" height="100" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="230" y="302" text-anchor="middle" font-weight="bold" fill="#1e293b">X Projection (2-3 muls)</text>
  <text x="230" y="322" text-anchor="middle" font-size="12" fill="#334155">sx = 128 + vx * recip_hi + (vx * recip_lo >> 8)</text>
  <text x="230" y="344" text-anchor="middle" font-size="11" fill="#64748b">sub-pixel: + (vx_frac * recip_hi >> 8)</text>
  <text x="230" y="366" text-anchor="middle" font-size="11" fill="#64748b">format: 8.0 x 0.8 = 8.8, take integer part</text>

  <!-- Y projection detail -->
  <rect x="480" y="280" width="400" height="100" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1"/>
  <text x="680" y="302" text-anchor="middle" font-weight="bold" fill="#1e293b">Y Projection (2 muls per height)</text>
  <text x="680" y="322" text-anchor="middle" font-size="12" fill="#334155">sy = 80 - (h * recip_hi + (h * recip_lo >> 8))</text>
  <text x="680" y="344" text-anchor="middle" font-size="11" fill="#64748b">h = (ceil_h - vz) or (floor_h - vz), s8</text>
  <text x="680" y="366" text-anchor="middle" font-size="11" fill="#64748b">VWH table provides precomputed heights</text>

  <!-- ====== CACHES (bottom) ====== -->

  <!-- Vertex cache -->
  <rect x="40" y="420" width="380" height="80" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="230" y="442" text-anchor="middle" font-weight="bold" fill="#065f46">Vertex Cache</text>
  <text x="230" y="462" text-anchor="middle" font-size="11" fill="#065f46">512 entries x 8B @ $0670 | 64B valid bitmap @ $1670</text>
  <text x="230" y="480" text-anchor="middle" font-size="11" fill="#065f46">stores: vx(s16) vy(s16) vi(u16) | indexed by vertex ID</text>
  <text x="230" y="496" text-anchor="middle" font-size="10" fill="#059669">eliminates redundant transforms for shared vertices</text>

  <!-- VWH cache -->
  <rect x="480" y="420" width="400" height="80" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="680" y="442" text-anchor="middle" font-weight="bold" fill="#854d0e">VWH Cache</text>
  <text x="680" y="462" text-anchor="middle" font-size="11" fill="#854d0e">1216 entries x 2B @ $16B0 | 160B valid bitmap @ $2030</text>
  <text x="680" y="480" text-anchor="middle" font-size="11" fill="#854d0e">stores: screen_y(s16) | indexed by VWH ID</text>
  <text x="680" y="496" text-anchor="middle" font-size="10" fill="#ca8a04">eliminates redundant Y projection for shared (vertex, height)</text>

  <!-- Dashed lines connecting caches to pipeline stages -->
  <line x1="230" y1="420" x2="230" y2="380" stroke="#059669" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <line x1="680" y1="420" x2="680" y2="380" stroke="#ca8a04" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- ====== PLAYER INPUT (left side) ====== -->

  <rect x="20" y="165" width="170" height="75" rx="6" fill="#f1f5f9" stroke="#64748b" stroke-width="1"/>
  <text x="105" y="185" text-anchor="middle" font-weight="bold" fill="#334155">Per-frame setup</text>
  <text x="105" y="202" text-anchor="middle" font-size="11" fill="#475569">decompose_angle</text>
  <text x="105" y="217" text-anchor="middle" font-size="11" fill="#475569">compute_frac_rotation</text>
  <text x="105" y="232" text-anchor="middle" font-size="10" fill="#64748b">4 muls (amortised)</text>

  <!-- Arrow from per-frame to rotation -->
  <line x1="170" y1="180" x2="220" y2="130" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <!-- Multiply count summary -->
  <rect x="240" y="165" width="200" height="55" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="340" y="185" text-anchor="middle" font-weight="bold" fill="#991b1b">Per-vertex multiply budget</text>
  <text x="340" y="205" text-anchor="middle" font-size="11" fill="#991b1b">4 (rot) + 3 (sx) + 4 (sy) = 11 max</text>

</svg>
