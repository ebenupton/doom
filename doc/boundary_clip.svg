<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 380" font-family="monospace" font-size="12">
  <rect width="560" height="380" fill="white"/>

  <!-- Axes -->
  <line x1="50" y1="320" x2="520" y2="320" stroke="black" stroke-width="1.5"/>
  <line x1="50" y1="320" x2="50" y2="20" stroke="black" stroke-width="1.5"/>
  <text x="285" y="345" text-anchor="middle" font-size="13">X</text>
  <text x="20" y="170" text-anchor="middle" font-size="13" transform="rotate(-90,20,170)">Y (screen: down=positive)</text>

  <!-- Span trapezoid -->
  <polygon points="100,80 440,60 440,260 100,220" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>

  <!-- Bottom boundary (emphasized) -->
  <line x1="100" y1="220" x2="440" y2="260" stroke="#336699" stroke-width="2.5"/>
  <text x="455" y="260" font-size="11" fill="#336699">bot boundary</text>

  <!-- Line: enters from inside, crosses boundary and exits below -->
  <!-- P1 inside at (130, 160), P2 outside at (400, 290) -->
  <line x1="130" y1="160" x2="400" y2="290" stroke="#FF3333" stroke-width="2"/>

  <!-- Rejected portion (dashed) -->
  <line x1="300" y1="245" x2="400" y2="290" stroke="#999999" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Accepted portion (solid red) -->
  <line x1="130" y1="160" x2="300" y2="245" stroke="#FF3333" stroke-width="2.5"/>

  <!-- P1 endpoint (inside) -->
  <circle cx="130" cy="160" r="5" fill="black"/>
  <text x="70" y="155" font-size="10">P1 (cx1,cy1)</text>
  <text x="70" y="167" font-size="10" fill="green">inside</text>

  <!-- P2 endpoint (outside) -->
  <circle cx="400" cy="290" r="5" fill="#999999"/>
  <text x="405" y="300" font-size="10" fill="#999999">P2 (cx2,cy2)</text>
  <text x="405" y="312" font-size="10" fill="#FF3333">outside (below)</text>

  <!-- Intersection point -->
  <circle cx="300" cy="245" r="6" fill="black" stroke="#FF3333" stroke-width="2"/>
  <text x="310" y="240" font-size="10" font-weight="bold">ix (intersection)</text>

  <!-- d1 annotation: distance from P1 to boundary at cx1 -->
  <line x1="135" y1="160" x2="135" y2="225" stroke="#006600" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="140" y="195" font-size="10" fill="#006600">d1 &lt; 0</text>
  <text x="140" y="207" font-size="10" fill="#006600">(inside)</text>

  <!-- d2 annotation: distance from P2 to boundary at cx2 -->
  <line x1="395" y1="255" x2="395" y2="290" stroke="#CC0000" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="400" y="275" font-size="10" fill="#CC0000">d2 &gt; 0</text>
  <text x="400" y="287" font-size="10" fill="#CC0000">(outside)</text>

  <!-- Ceiling-toward-inside arrow -->
  <line x1="300" y1="300" x2="285" y2="300" stroke="black" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="305" y="305" font-size="10">ceiling toward inside</text>
  <text x="305" y="317" font-size="10">(round ix toward P1)</text>

  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="black"/>
    </marker>
  </defs>

  <!-- Formula box -->
  <rect x="80" y="340" width="420" height="30" fill="#f0f0f0" stroke="black" rx="3"/>
  <text x="290" y="360" text-anchor="middle" font-size="11" font-weight="bold">ix = cx1 + (cx2-cx1)*d1 / (d1-d2), rounded toward inside</text>
</svg>