<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="monospace" font-size="12">
  <!-- Background -->
  <rect width="520" height="340" fill="white"/>

  <!-- Axes -->
  <line x1="60" y1="280" x2="480" y2="280" stroke="black" stroke-width="1.5"/>
  <line x1="60" y1="280" x2="60" y2="30" stroke="black" stroke-width="1.5"/>
  <text x="270" y="310" text-anchor="middle" font-size="13">X (pixels, u8)</text>
  <text x="20" y="160" text-anchor="middle" font-size="13" transform="rotate(-90,20,160)">Y (8.8 fixed, s16)</text>

  <!-- X axis ticks -->
  <line x1="100" y1="280" x2="100" y2="285" stroke="black"/>
  <text x="100" y="298" text-anchor="middle" font-size="10">xlo</text>
  <line x1="420" y1="280" x2="420" y2="285" stroke="black"/>
  <text x="420" y="298" text-anchor="middle" font-size="10">xhi</text>

  <!-- Span trapezoid fill -->
  <polygon points="100,80 420,50 420,240 100,200" fill="#CCE5FF" stroke="#336699" stroke-width="2"/>

  <!-- Top boundary -->
  <line x1="100" y1="80" x2="420" y2="50" stroke="#336699" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="250" y="48" fill="#336699" font-size="11">top boundary (yt_lo -> yt_hi)</text>

  <!-- Bottom boundary -->
  <line x1="100" y1="200" x2="420" y2="240" stroke="#336699" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="250" y="262" fill="#336699" font-size="11">bottom boundary (yb_lo -> yb_hi)</text>

  <!-- Endpoint labels -->
  <circle cx="100" cy="80" r="4" fill="black"/>
  <text x="72" y="75" font-size="10" text-anchor="end">yt_lo</text>
  <circle cx="100" cy="200" r="4" fill="black"/>
  <text x="72" y="205" font-size="10" text-anchor="end">yb_lo</text>
  <circle cx="420" cy="50" r="4" fill="black"/>
  <text x="435" y="45" font-size="10">yt_hi</text>
  <circle cx="420" cy="240" r="4" fill="black"/>
  <text x="435" y="245" font-size="10">yb_hi</text>

  <!-- Field layout box -->
  <rect x="80" y="5" width="380" height="25" fill="#f0f0f0" stroke="black" rx="3"/>
  <text x="270" y="22" text-anchor="middle" font-size="11" font-weight="bold">Span: (xlo, xhi, yt_lo, yb_lo, yt_hi, yb_hi)  --  6 bytes</text>

  <!-- Interval notation -->
  <line x1="100" y1="275" x2="420" y2="275" stroke="#FF3333" stroke-width="2"/>
  <text x="95" y="273" font-size="10" fill="#FF3333">[</text>
  <text x="422" y="273" font-size="10" fill="#FF3333">)</text>
  <text x="260" y="270" text-anchor="middle" font-size="10" fill="#FF3333">half-open interval [xlo, xhi)</text>
</svg>