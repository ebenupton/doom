<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="monospace" font-size="12">
  <rect width="820" height="520" fill="white"/>

  <!-- Axes -->
  <line x1="30" y1="380" x2="790" y2="380" stroke="black" stroke-width="1.5"/>
  <line x1="30" y1="380" x2="30" y2="20" stroke="black" stroke-width="1.5"/>
  <text x="410" y="400" text-anchor="middle" font-size="13">X</text>
  <text x="12" y="200" text-anchor="middle" font-size="13" transform="rotate(-90,12,200)">Y</text>

  <!-- ============================================================ -->
  <!-- Span 0 (x=50..140) — line enters via inner bbox accept       -->
  <!-- ============================================================ -->
  <polygon points="50,40 140,50 140,280 50,260" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="95" y="150" text-anchor="middle" font-size="10" fill="#336699">span 0</text>
  <text x="50" y="395" text-anchor="middle" font-size="9">50</text>
  <text x="140" y="395" text-anchor="middle" font-size="9">140</text>

  <!-- Span 1 (x=140..240) — portal 1 cheap accept, portal 2 exact -->
  <polygon points="140,50 240,55 240,270 140,280" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="190" y="155" text-anchor="middle" font-size="10" fill="#336699">span 1</text>
  <text x="240" y="395" text-anchor="middle" font-size="9">240</text>

  <!-- Span 2 (x=240..350) — portal 2 exact narrows, portal 3 fail -->
  <polygon points="240,55 350,70 350,250 240,270" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="295" y="155" text-anchor="middle" font-size="10" fill="#336699">span 2</text>
  <text x="350" y="395" text-anchor="middle" font-size="9">350</text>

  <!-- Span 3 (x=350..440) — portal 3 fails here                    -->
  <polygon points="350,100 440,120 440,230 350,250" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="395" y="175" text-anchor="middle" font-size="10" fill="#336699">span 3</text>
  <text x="440" y="395" text-anchor="middle" font-size="9">440</text>

  <!-- GAP: spans 3 and 4 are NOT contiguous (gap at x=440..490) -->
  <text x="465" y="205" text-anchor="middle" font-size="10" fill="#666666">gap</text>

  <!-- Span 4 (x=490..560) — outer bbox reject (line Y above span) -->
  <polygon points="490,170 560,180 560,300 490,280" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="525" y="230" text-anchor="middle" font-size="10" fill="#336699">span 4</text>
  <text x="490" y="395" text-anchor="middle" font-size="9">490</text>
  <text x="560" y="395" text-anchor="middle" font-size="9">560</text>

  <!-- Span 5 (x=600..730) — CB clip entry/exit                     -->
  <polygon points="600,60 730,80 730,270 600,250" fill="#CCE5FF" stroke="#336699" stroke-width="1.5"/>
  <text x="665" y="160" text-anchor="middle" font-size="10" fill="#336699">span 5</text>
  <text x="600" y="395" text-anchor="middle" font-size="9">600</text>
  <text x="730" y="395" text-anchor="middle" font-size="9">730</text>

  <!-- ============================================================ -->
  <!-- Portal apertures (vertical green bars at shared boundaries)  -->
  <!-- ============================================================ -->

  <!-- Portal 1 at x=140 (between span 0 and span 1) — wide -->
  <line x1="140" y1="50" x2="140" y2="280" stroke="#33AA33" stroke-width="4" opacity="0.7"/>
  <text x="140" y="30" text-anchor="middle" font-size="9" fill="#33AA33">portal 1</text>

  <!-- Portal 2 at x=240 (between span 1 and span 2) — wide -->
  <line x1="240" y1="55" x2="240" y2="270" stroke="#33AA33" stroke-width="4" opacity="0.7"/>
  <text x="240" y="30" text-anchor="middle" font-size="9" fill="#33AA33">portal 2</text>

  <!-- Portal 3 at x=350 (between span 2 and span 3) — NARROW -->
  <line x1="350" y1="100" x2="350" y2="250" stroke="#33AA33" stroke-width="4" opacity="0.7"/>
  <text x="350" y="30" text-anchor="middle" font-size="9" fill="#33AA33">portal 3</text>
  <text x="336" y="98" text-anchor="end" font-size="8" fill="#33AA33">pt=100</text>
  <text x="336" y="254" text-anchor="end" font-size="8" fill="#33AA33">pb=250</text>

  <!-- ============================================================ -->
  <!-- Full line path (dashed grey for rejected/invisible portions) -->
  <!-- Line: (60,90) to (720,140) — shallow downward slope          -->
  <!-- ============================================================ -->
  <line x1="60" y1="90" x2="720" y2="140" stroke="#999999" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ============================================================ -->
  <!-- Y bbox band — initial y_lo/y_hi across full line extent      -->
  <!-- ============================================================ -->
  <rect x="50" y="88" width="680" height="54" fill="#FF3333" opacity="0.06" stroke="#FF3333" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="48" y="86" text-anchor="end" font-size="8" fill="#FF3333">y_lo=90</text>
  <text x="48" y="146" text-anchor="end" font-size="8" fill="#FF3333">y_hi=140</text>

  <!-- Narrowed Y bbox after portal 2 (tighter band from x=240 onward) -->
  <rect x="240" y="97" width="490" height="25" fill="#FF9900" opacity="0.10" stroke="#FF9900" stroke-width="0.5" stroke-dasharray="4,3"/>
  <text x="310" y="94" font-size="8" fill="#FF9900">narrowed: y_lo=103, y_hi=117</text>

  <!-- ============================================================ -->
  <!-- Segment 1 (orange): enter span 0 -> through portals 1,2 ->  -->
  <!--   portal 3 fail -> CB clip exit in span 2                    -->
  <!-- ============================================================ -->
  <line x1="60" y1="90" x2="338" y2="111" stroke="#FFAA00" stroke-width="3"/>

  <!-- Entry point: inner bbox accept at left edge of span 0 -->
  <circle cx="60" cy="90" r="5" fill="black"/>
  <text x="62" y="80" font-size="9">enter (inner bbox)</text>

  <!-- CB clip exit in span 2 (before portal 3) -->
  <circle cx="338" cy="111" r="5" fill="black"/>
  <text x="270" y="130" font-size="9">CB clip exit</text>

  <!-- ============================================================ -->
  <!-- Segment 2 (orange): CB clip entry into span 5, CB clip exit  -->
  <!-- ============================================================ -->
  <line x1="618" y1="132" x2="712" y2="139" stroke="#FFAA00" stroke-width="3"/>

  <!-- CB clip entry into span 5 -->
  <circle cx="618" cy="132" r="5" fill="black"/>
  <text x="610" y="125" font-size="9" text-anchor="end">CB clip entry</text>

  <!-- CB clip exit at right side of span 5 -->
  <circle cx="712" cy="139" r="5" fill="black"/>
  <text x="717" y="132" font-size="9">CB clip exit</text>

  <!-- ============================================================ -->
  <!-- Portal check annotations                                     -->
  <!-- ============================================================ -->

  <!-- Portal 1: cheap Y bbox accept -->
  <circle cx="140" cy="96" r="4" fill="#33AA33"/>
  <text x="148" y="88" font-size="9" fill="#33AA33" font-weight="bold">cheap accept</text>

  <!-- Portal 2: exact check, narrows Y -->
  <circle cx="240" cy="104" r="4" fill="#DDAA00"/>
  <text x="248" y="73" font-size="9" fill="#AA8800" font-weight="bold">exact -> narrow Y range</text>

  <!-- Portal 3: exact Y outside aperture — FAIL -->
  <circle cx="350" cy="112" r="4" fill="#FF3333"/>
  <text x="358" y="52" font-size="9" fill="#FF3333" font-weight="bold">portal fail -> CB clip exit</text>

  <!-- Line Y at portal 3: outside the narrowed aperture -->
  <!-- (The line at x=350 is at y~112, but aperture top pt=100 and -->
  <!--  the line's exact Y would be outside the narrowed range)     -->

  <!-- Span 4: outer reject -->
  <text x="525" y="163" text-anchor="middle" font-size="9" fill="#FF3333" font-weight="bold">outer reject</text>
  <text x="525" y="152" text-anchor="middle" font-size="8" fill="#FF3333">(line Y above span)</text>

  <!-- Span 5: CB clip entry/exit -->
  <text x="665" y="102" text-anchor="middle" font-size="9" fill="#AA8800" font-weight="bold">CB clip entry/exit</text>
  <text x="665" y="113" text-anchor="middle" font-size="8" fill="#AA8800">(inner bbox ambiguous)</text>

  <!-- ============================================================ -->
  <!-- Output segment labels                                        -->
  <!-- ============================================================ -->
  <rect x="100" y="340" width="230" height="24" fill="#FFAA00" fill-opacity="0.2" stroke="#FFAA00" rx="3"/>
  <text x="215" y="356" text-anchor="middle" font-size="10" font-weight="bold" fill="#996600">segment 1 (enter -> CB clip)</text>

  <rect x="560" y="340" width="200" height="24" fill="#FFAA00" fill-opacity="0.2" stroke="#FFAA00" rx="3"/>
  <text x="660" y="356" text-anchor="middle" font-size="10" font-weight="bold" fill="#996600">segment 2 (CB clip -> CB clip)</text>

  <!-- ============================================================ -->
  <!-- Annotation text at bottom                                    -->
  <!-- ============================================================ -->
  <text x="50" y="425" font-size="9">span 0: enter via inner bbox accept (y_lo=90,y_hi=140 inside span aperture) -- 0 muls</text>
  <text x="50" y="438" font-size="9">portal 1: y_lo,y_hi both inside aperture -- cheap accept (0 muls)</text>
  <text x="50" y="451" font-size="9">portal 2: cheap check ambiguous; compute exact Y=103, passes; narrow y_lo=103,y_hi=117 (2 muls)</text>
  <text x="50" y="464" font-size="9">portal 3: exact Y=112 outside narrowed aperture (pt=100, but top boundary at x=350 is 100) -- FAIL</text>
  <text x="50" y="477" font-size="9">  CB clip span 2 for exit -> output segment 1; walk resets</text>
  <text x="50" y="490" font-size="9">span 4: outer bbox reject (narrowed y_lo=103,y_hi=117 above span top=170) -- skip</text>
  <text x="50" y="503" font-size="9">span 5: inner bbox ambiguous -> CB clip entry; no next span -> CB clip exit -> output segment 2</text>
</svg>
