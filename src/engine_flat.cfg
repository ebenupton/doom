# Whole engine, flat build — one link: angle module + span clipper +
# bsp renderer. Cross-module calls resolve through the linker (imports),
# not hardcoded addresses. Bounds encode the real memory-map neighbours:
#   span_clip $2000 (umul8 pinned at $2030, jump-table gap zero-filled),
#   renderer $4800 below the framebuffer at $5800, LO below the clipper,
#   B below the vertex cache at $0C00, D below DEFQ_TAIL at $09FB,
#   W below TA_LO at $DC00, ANG below TA_HI at $F200.
MEMORY {
    CLIPJT: start = $2000, size = $0030, file = "span_clip.bin", fill = yes;
    CLIP:   start = $2030, size = $1640, file = "span_clip.bin"; # ceiling = ANIML2 @ $3670 (then RCACHE @ $3800)
    # $3800-$3FE8: RCACHE (rotation-coherence bbox cache data, BSS — no file);
    # see src/slope_div.s. Carved out of the old CLIP tail so clip growth
    # past $3800 is a LINK ERROR, not a silent collision.
    MAIN:   start = $4800, size = $1000, file = "bsp_render.bin";
    LO:     start = $1B40, size = $04C0, file = "bsp_render_lo.bin";
    B:      start = $0AA0, size = $0160, file = "bsp_render_b.bin";
    D:      start = $0978, size = $0083, file = "bsp_render_d.bin";
    W:      start = $DAC0, size = $0140, file = "bsp_render_w.bin";
    ANG:    start = $E940, size = $08C0, file = "bsp_render_ang.bin";
    # VXC fat paths + frame hook live in ANG (flat). VXC plane BSS:
    # $4000-$47D3 (XLO/XHI/XEXT/YLO) and $B200-$B5D3 (YHI/YEXT); valid
    # bitmap + state $05A0-$05FF (span pool ends $059F, DEFQ at $0600).
    # NOTE $D4C0-$DABF is the flat VWHC cache BSS - not free.
    # Animated sectors: hub in the clip-tail gap; tick/workers in the area
    # vacated by the VWH relocation to $FB00 (tables: SSMASK $E484,
    # TABL0 $E580, CFG $E680, TABL2 $E6D0 - poked by the harness).
    # ANIMH moved 2026-07-08 from the clip tail ($35B0) into the flat anim
    # block's spare tail (bsp_render_6502.py designates $E484-$E93F for the
    # flat anim tables + workers; $E840-$E93F was unclaimed) to make room
    # for clip growth (s16 entry ordering contract).
    ANIMH:   start = $E840, size = $0070, file = "bsp_render_anh.bin";
    ANIML0:  start = $E740, size = $0100, file = "bsp_render_al0.bin";
    ANIML2:  start = $3670, size = $0190, file = "bsp_render_al2.bin"; # ceiling = RCACHE @ $3800; clip growth past $3670 is a link error
}
SEGMENTS {
    CLIPJT: load = CLIPJT, type = ro;
    CLIP:   load = CLIP,   type = ro;
    MAIN:   load = MAIN,   type = ro;
    LO:     load = LO,     type = ro;
    B:      load = B,      type = ro;
    D:      load = D,      type = ro;
    W:      load = W,      type = ro;
    ANG:    load = ANG,    type = ro;
    ANIMH:  load = ANIMH,  type = ro;
    ANIML0: load = ANIML0, type = ro;
    ANIML2: load = ANIML2, type = ro;
}
