# Whole engine, flat build — one link. ONE CODE REGION (2026-07-12):
# the old archipelago (MAIN/LO/B/D/W/SEL/ANIML*) is a single region at
# $3670-$57FF, mirroring the banked build's structure (CLIP separate +
# one code region + ANG high where it physically fits). Evictions that
# opened the window: RCACHE -> the $5000-$57E8 CODE-tail carve
# (end_code <= $5000 link-asserted in bsp/main_tail.s), VXC planes ->
# the page pairs listed below. sqr stays at $A500.
# MAIN segment head at $3670 (MAIN_BASE flat; jump tables are gone —
# drivers/harness resolve entries by symbol from the linker map).
MEMORY {
    CLIP:   start = $2000, size = $1670, file = "span_clip.bin"; # ceiling = CODE @ $3670
    CODE:   start = $3670, size = $2190, file = "bsp_render.bin";
    # Cold islands (once-per-frame / boot-only code; hot code = ONE region):
    SEL:    start = $A400, size = $0100, file = "bsp_render_sel.bin";
    LOXA:   start = $FA30, size = $03D0, file = "bsp_render_lox.bin"; # $FA30-$FDFF: after the bca_*/vxc_* var block ($FA00-$FA2F), below the $FE00 hooks — full-symmap audited. SQUATTER MAP (none visible in cfgs!): sqr $A500, NJ $A900-$B1EE, VXC $B200/$B400, ROM_BBOX_C $C600.., VWHC $D500, TA_LO $DC00, TA_HI $F200, VATOX $F600, bca_* vars $FA10.., hooks $FE00 — scan symmap MERGED (all modules) before claiming space
    ACOLD:  start = $E740, size = $0170, file = "bsp_render_ac.bin";
    ANG:    start = $E940, size = $08C0, file = "bsp_render_ang.bin";
    ANGX:   start = $F200, size = $0400, file = "bsp_render_angx.bin"; # the old TA_HI page — DEAD since option F (2026-07-17); sign-class corner_phi entries live here
    # Flat BSS (not linker-managed, documented): RCACHE $5000-$57E8 (CODE-tail carve, link-asserted),
    # VXC planes $9800-$9BFF + $1C00-$1FFF + $B200-$B5FF, sqr $A500-$A8FF (unchanged),
    # VWHC $D500-$D9FF, vcache $0C00-$1B3F. $1B40-$1FFF and page $0100
    # are FREE (reserved headroom).
}
SEGMENTS {
    CLIP:   load = CLIP,   type = ro;
    MAIN:   load = CODE,   type = ro;  # first: jt at $3670 (asserted)
    LO:     load = CODE,   type = ro;
    B:      load = CODE,   type = ro;  # small segments BEFORE the aligned
    D:      load = CODE,   type = ro;  # RNSPG (2026-07-19): they fill the
    W:      load = CODE,   type = ro;  # page-align gap instead of wasting
    RNSPG:     load = CODE,   type = ro, align = $100;  # up to $FF on it
    ANIMH:  load = ACOLD,  type = ro;
    ANIML0: load = ACOLD,  type = ro;
    ANIML2: load = CODE,   type = ro;
    ZC:     load = CODE,   type = ro;  # bbox corner zone/side arms (corner_phi.s)
    ZZTAIL: load = CODE,   type = ro;  # true-end marker: the tail assert covers EVERY segment
    SEL:    load = SEL,    type = ro;
    LOX:    load = LOXA,   type = ro;  # relocated clip helpers (flat: own window; banked: CODE)
    ANG:    load = ANG,    type = ro;
    ANGX:   load = ANGX,   type = ro;  # sign-class corner_phi entries (corner_phi.s)
}