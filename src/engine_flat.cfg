# Whole engine, flat build — one link: angle module + span clipper +
# bsp renderer. Cross-module calls resolve through the linker (imports),
# not hardcoded addresses. Bounds encode the real memory-map neighbours:
#   span_clip $2000 (umul8 pinned at $2030, jump-table gap zero-filled),
#   renderer $4800 below the framebuffer at $5800, LO below the clipper,
#   B below the vertex cache at $0C00, D below DEFQ_TAIL at $09FB,
#   W below TA_LO at $DC00, ANG below TA_HI at $F200.
MEMORY {
    CLIPJT: start = $2000, size = $0030, file = "span_clip.bin", fill = yes;
    CLIP:   start = $2030, size = $17D0, file = "span_clip.bin"; # ceiling = RCACHE @ $3800
    # $3800-$3FE8: RCACHE (rotation-coherence bbox cache data, BSS — no file);
    # see src/slope_div.s. Carved out of the old CLIP tail so clip growth
    # past $3800 is a LINK ERROR, not a silent collision.
    MAIN:   start = $4800, size = $1000, file = "bsp_render.bin";
    LO:     start = $1B40, size = $04C0, file = "bsp_render_lo.bin";
    B:      start = $0AA0, size = $0160, file = "bsp_render_b.bin";
    D:      start = $0978, size = $0083, file = "bsp_render_d.bin";
    W:      start = $DAC0, size = $0140, file = "bsp_render_w.bin";
    ANG:    start = $E940, size = $08C0, file = "bsp_render_ang.bin";
}
SEGMENTS {
    CLIPJT: load = CLIPJT, type = ro;
    CLIP:   load = CLIP,   type = ro;
    MAIN:   load = MAIN,   type = ro;
    LO:     load = LO,     type = ro;
    B:      load = B,      type = ro;
    D:      load = D,      type = ro;
    W:      load = W,      type = ro;
    ANG:    load = ANG,    type = ro;
}
