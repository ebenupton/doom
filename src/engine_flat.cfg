# Whole engine, flat (py65 harness) build — THREE segments (2026-07-20):
#   CODE  — every routine that fits below the corner-phi memo ($5500)
#           and the framebuffer ($5800). One blob, one file; content
#           order = object order (slope_div=ang module, span_clip,
#           bsp_render) then include order.
#   HIGH  — the $E740-$F0FF island (RCACHE_STATE pins $F100).
#   HIGHX — the $F200-$F5FF island (VATOX pins $F600).
# Everything else in the address space is DATA, placed by the loaders
# (squatter map: sqr $A400, NJ $A900-$B1EE, VXC $B200/$B400, NODE_SOA
# $B600, ROM_BBOX_C $C600.., VWHC $D500, TA_LO $DC00, recip $E000,
# RCACHE planes, VATOX $F600, bca vars $FA10.., hooks $FE00 — scan
# symmap MERGED before claiming space), or the framebuffer $5800-$6BFF.
MEMORY {
    CODE:   start = $2000, size = $4200, file = "engine_code.bin";
}
SEGMENTS {
    CODE:   load = CODE,  type = ro, align = $100;
}
