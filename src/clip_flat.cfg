# span_clip — flat build @ $2000 (span_clip.bin). Code must stay below the
# renderer at $4800. umul8 is pinned at $2030 (harness/bsp_render call it
# there): the jump-table area is zero-filled up to the pin, matching the
# beebasm ORG-forward gap.
MEMORY {
    CLIPJT: start = $2000, size = $0030, file = %O, fill = yes;
    CLIP:   start = $2030, size = $27D0, file = %O;
}
SEGMENTS {
    CLIPJT: load = CLIPJT, type = ro;
    CLIP:   load = CLIP,   type = ro;
}
