# bsp_render — flat build, five output regions (same as the beebasm SAVEs).
# Bounds encode the real neighbours: framebuffer at $5800, span_clip at $2000,
# vertex cache at $0C00, DEFQ_TAIL at $09FB, TA_LO at $DC00.
MEMORY {
    MAIN: start = $4800, size = $1000, file = "bsp_render.bin";
    LO:   start = $1B40, size = $04C0, file = "bsp_render_lo.bin";
    B:    start = $0AA0, size = $0160, file = "bsp_render_b.bin";
    D:    start = $0978, size = $0083, file = "bsp_render_d.bin";
    W:    start = $DAC0, size = $0140, file = "bsp_render_w.bin";
}
SEGMENTS {
    MAIN: load = MAIN, type = ro;
    LO:   load = LO,   type = ro;
    B:    load = B,    type = ro;
    D:    load = D,    type = ro;
    W:    load = W,    type = ro;
}
