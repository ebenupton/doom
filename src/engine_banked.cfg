# Whole engine, BANKED build (Model B port) — one link.
# 2026-07-10 reshuffle shape: banks hold DATA (L0/L2 level+derived data,
# C = clipper+rasteriser+HUD), all other CODE lives in main below $8000.
# Memory areas are collapsed to the minimum the fixed anchors allow:
#   LOWA $1B40-$1FFF  (ends at the sqr-table hole $2000-$23FF — BOTH banks'
#                      code multiplies through those tables; nothing else
#                      may live there)
#   LOWB $2400-$39FF  (FHCH's old home; ends below the BCA_WS angle
#                      workspace hole $3A00-$3A3F)
#   LOWC $3A40-$3BFF  (below anim_drv at $3C00; walk_drv at $4000)
#   MAIN $4800-$57FF  (screen at $5800)
#   STK  $0100-$01BF  (bottom of the hardware stack page; staged in L2
#                      $A100 at load, drivers copy down at boot — page 1
#                      cannot be *LOADed)
# ANIML2 must start EXACTLY at $2800: walk_drv's anim glue JMPs $2800/$2803
# (jt_anim_tick/init). align=$100 places it there while RCCODE stays in
# 769..1024 bytes; a link-time .assert in anim.s fails the build otherwise.
MEMORY {
    CLIP_BK: start = $8000, size = $4000, file = "span_clip_bankc.bin";
    MAIN:    start = $4800, size = $1000, file = "bsp_render_bk.bin";
    LOWA:    start = $1B40, size = $04C0, file = "bsp_render_lo_bk.bin";
    LOWB:    start = $2400, size = $1600, file = "bsp_render_lowb_bk.bin";
    LOWC:    start = $3A40, size = $01C0, file = "bsp_render_lowc_bk.bin";
    # Debug HUD: OS-font text on the top FB row (bank C window; driver
    # calls $A400 via the $3DA0 glue when hud_en is set).
    HUD:     start = $A400, size = $0200, file = "bsp_render_hud_bk.bin";
    STK:     start = $0100, size = $00C0, file = "bsp_render_stk_bk.bin";
}
SEGMENTS {
    CLIP_BK: load = CLIP_BK, type = ro;
    MAIN:    load = MAIN,    type = ro;
    LO:      load = LOWA,    type = ro;
    RCCODE:  load = LOWB,    type = ro;
    ANIML2:  load = LOWB,    type = ro, align = $100; # -> $2800 (driver JMPs)
    ANIML0:  load = LOWB,    type = ro;
    VXCODE:  load = LOWB,    type = ro;
    SEL:     load = LOWB,    type = ro;
    ANIMH:   load = LOWB,    type = ro;
    ANG_BK:  load = LOWB,    type = ro;
    W_BK:    load = LOWB,    type = ro;
    B_BK:    load = LOWC,    type = ro;
    D_BK:    load = LOWC,    type = ro;
    HUD:     load = HUD,     type = ro;
    STK:     load = STK,     type = ro;
}
