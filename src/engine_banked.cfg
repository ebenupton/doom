# Whole engine, BANKED build (Model B port) — one link.
# 2026-07-10 one-region merge: banks hold DATA (L0/L2 level+derived data,
# C = clipper+rasteriser+HUD), ALL engine code lives in ONE main-RAM region.
# Main-RAM map (low to high):
#   $0100-$01BF  STK   RNS vectoring block (staged in L2 $A100; page 1
#                      cannot be *LOADed — drivers copy down at boot)
#   $0C00-$1B3A  vcache + valid bitmap (BSS)
#   $1B40-$1B7F  BCA_WS angle workspace (BSS; bca_ab = $1B6F driver-poked)
#   $1C00-$1FFF  sqr tables (loader-seeded; both banks' code multiplies
#                      through them — nothing else may live there)
#   $2000-$2BFF  beebasm drivers (anim/walk drv $2000, vars $2180, glue
#                      $21A0, sincos $2200-$23FF, clears+input $2400)
#   $2C00-$57FF  CODE  the whole engine, MAIN first: the driver-facing
#                      jump table is PINNED at $2C00 (asserts in header.s;
#                      jt_anim_tick/init live in the same table at
#                      +$1E/+$21) — everything after it floats freely.
#   $5800-$7FFF  screen
MEMORY {
    CLIP_BK: start = $8000, size = $4000, file = "span_clip_bankc.bin";
    CODE:    start = $2C00, size = $2C00, file = "bsp_render_bk.bin";
    # Debug HUD: OS-font text on the top FB row (bank C window; driver
    # calls $A400 via the $21A0 glue when hud_en is set).
    HUD:     start = $A400, size = $0200, file = "bsp_render_hud_bk.bin";
    STK:     start = $0100, size = $00C0, file = "bsp_render_stk_bk.bin";
}
SEGMENTS {
    CLIP_BK: load = CLIP_BK, type = ro;
    MAIN:    load = CODE,    type = ro;  # first: jt at $2C00 (asserted)
    LO:      load = CODE,    type = ro;
    RCCODE:  load = CODE,    type = ro;
    ANIML2:  load = CODE,    type = ro;
    ANIML0:  load = CODE,    type = ro;
    VXCODE:  load = CODE,    type = ro;
    SEL:     load = CODE,    type = ro;
    ANIMH:   load = CODE,    type = ro;
    ANG_BK:  load = CODE,    type = ro;
    W_BK:    load = CODE,    type = ro;
    B_BK:    load = CODE,    type = ro;
    D_BK:    load = CODE,    type = ro;
    HUD:     load = HUD,     type = ro;
    STK:     load = STK,     type = ro;
}
