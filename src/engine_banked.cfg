# Whole engine, banked (BBC hardware) build — code + the bank windows
# (2026-07-20 consolidation):
#   CODE  — ALL main-RAM engine code, $2C00-$57FF (FB at $5800). One
#           blob; content order = object order (slope_div=ang module,
#           span_clip, bsp_render) then include order.
#   BANKC — the clipper+rasteriser bank C window ($8000).
#   HUD   — debug HUD, bank C window @ $A400.
MEMORY {
    BANKC:  start = $8000, size = $4000, file = "span_clip_bankc.bin";
    CODE:   start = $2C00, size = $2C00, file = "bsp_render_bk.bin";
    HUD:    start = $A400, size = $0200, file = "bsp_render_hud_bk.bin";
}
SEGMENTS {
    BANKC:  load = BANKC, type = ro;
    CODE:   load = CODE,  type = ro, align = $100;
    HUD:    load = HUD,   type = ro;
}
