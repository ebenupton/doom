# Whole engine, BANKED build (Model B port) — one link.
# Clipper in sideways bank C @ $8000; angle module and the W/B/D regions
# relocate to clipper-vacated low RAM; anim_drv sits at $3C00.
MEMORY {
    CLIP_BK: start = $8000, size = $4000, file = "span_clip_bankc.bin";
    MAIN:    start = $4800, size = $1000, file = "bsp_render_bk.bin";
    LO:      start = $1B40, size = $04C0, file = "bsp_render_lo_bk.bin";
    RCCODE:  start = $B500, size = $0400, file = "bsp_render_rc_bk.bin"; # rotation-cache code, bank L2 window (data $AD00-$B4E8; VWHC arrays end $ACFF)
    W_BK:    start = $3900, size = $0140, file = "bsp_render_w_bk.bin";
    B_BK:    start = $3A40, size = $0180, file = "bsp_render_b_bk.bin";
    D_BK:    start = $3BC0, size = $0040, file = "bsp_render_d_bk.bin"; # anim_drv at $3C00!
    ANG_BK:  start = $3400, size = $0500, file = "bsp_render_ang_bk.bin"; # ceiling = W_BK @ $3900
    # VXC fat paths, bank C window (clipper must stay < $9700 — planes BSS
    # $9700-$A2D3, code $A300; rasteriser at $A900). Valid+state $05A0-$05FF.
    VXCODE:  start = $A300, size = $0100, file = "bsp_render_vxc_bk.bin";
    # Debug HUD: OS-font text on the top FB row (bank C window; driver
    # calls $A400 via the $3DA0 glue when hud_en is set). Restored
    # 2026-07-08 — the RNS vectoring that briefly took this window lives
    # in the STK region instead.
    HUD:     start = $A400, size = $0200, file = "bsp_render_hud_bk.bin";
    # STK: bottom of the hardware stack page (RNS vectoring block; SP floor
    # measured $F1, $01C0+ reserved for the stack). The disc cannot *LOAD
    # into page 1 (the OS is using it), so the image is STAGED in bank L2
    # at $A100 and the drivers copy it down at boot (see walk_drv/banked_boot).
    STK:     start = $0100, size = $00C0, file = "bsp_render_stk_bk.bin";
    # Animated sectors: hub resident in the FHCH..ANG_BK gap; tick/L0 worker
    # in the bank L0 image tail ($BE00 window; tables SSMASK $BB00,
    # TABL0 $BC00, CFG $BD00); VWH worker in the bank L2 tail ($BA00,
    # TABL2 $B900). Bank copies handled by banked_bsp/build_anim images.
    ANIMH:   start = $3390, size = $0070, file = "bsp_render_anh_bk.bin"; # above banked FHCH end ($2400+662*6=$3384); ANG_BK @ $3400
    ANIML0:  start = $BE00, size = $0200, file = "bsp_render_al0_bk.bin";
    ANIML2:  start = $BA00, size = $0200, file = "bsp_render_al2_bk.bin";
}
SEGMENTS {
    CLIP_BK: load = CLIP_BK, type = ro;
    MAIN:    load = MAIN,    type = ro;
    LO:      load = LO,      type = ro;
    RCCODE:  load = RCCODE,  type = ro;
    W_BK:    load = W_BK,    type = ro;
    B_BK:    load = B_BK,    type = ro;
    D_BK:    load = D_BK,    type = ro;
    ANG_BK:  load = ANG_BK,  type = ro;
    VXCODE:  load = VXCODE,  type = ro;
    HUD:     load = HUD,     type = ro;
    SEL:     load = HUD,     type = ro; # rides the HUD window slack
    STK:     load = STK,     type = ro;
    ANIMH:   load = ANIMH,   type = ro;
    ANIML0:  load = ANIML0,  type = ro;
    ANIML2:  load = ANIML2,  type = ro;
}
